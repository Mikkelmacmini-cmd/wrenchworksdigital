<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" fill="none">
  <defs>
    <style>
      .wrenchworks {
        font-family: Inter, Sora, Arial, Helvetica, sans-serif;
        font-size: 120px;
        font-weight: 600;
        letter-spacing: -2px;
        fill: #FFFFFF;
      }
      .digital {
        font-family: Inter, Sora, Arial, Helvetica, sans-serif;
        font-size: 64px;
        font-weight: 300;
        letter-spacing: 18px;
        fill: #3B82F6;
      }
    </style>
  </defs>

  <rect width="1200" height="420" fill="transparent"/>

  <g text-anchor="middle">
    <text x="600" y="180" class="wrenchworks">WRENCH WORKS</text>
    <text x="600" y="280" class="digital">DIGITAL</text>
  </g>
</svg>
